<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balu ❤️ Lakshmi Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    color: white;
    text-align: center;
    background: url('lakshmi.jpeg') no-repeat center/cover;
}

/* Overlay */
.overlay {
    background: rgba(0,0,0,0.7);
    min-height: 100vh;
    padding: 50px 20px;
}

/* Title */
h1 {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
}

/* Card */
.card {
    background: rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    margin-top: 30px;
}

/* Button */
button {
    margin-top: 20px;
    padding: 12px 30px;
    border-radius: 30px;
    border: none;
    background: gold;
    color: black;
    cursor: pointer;
}

/* Countdown */
#countdown {
    margin-top: 20px;
    font-size: 20px;
}

/* Gallery */
.gallery img {
    width: 200px;
    margin: 10px;
    border-radius: 10px;
}

/* Hidden */
.details {
    display: none;
}
</style>
</head>

<body>

<div class="overlay">

<h1>Balu ❤️ Lakshmi</h1>
<p>We invite you to our wedding 💍</p>

<div id="countdown"></div>

<button onclick="openInvite()">Open Invitation</button>

<div class="card details" id="details">
    <h2>💍 Wedding Ceremony</h2>
    <p>📅 30 April 2026</p>
    <p>⏰ 12:48 AM</p>
    <p>📍 Sri Veera Venkata Satyanarayana Swamy Vari Devasthanam</p>
    <p>With love & blessings, join our journey ❤️</p>

    <div class="gallery">
        <img src="lakshmi.jpeg">
        <img src="lakshmi2.jpeg">
        <img src="lakshmi3.jpeg">
        <img src="lakshmi4.jpeg">
        <img src="photo.jpeg">
    </div>
</div>

</div>

<script>
function openInvite() {
    document.getElementById("details").style.display = "block";
}

/* Countdown */
var countDownDate = new Date("Apr 30, 2026 00:48:00").getTime();

var x = setInterval(function() {
  var now = new Date().getTime();
  var distance = countDownDate - now;

  var days = Math.floor(distance / (1000 * 60 * 60 * 24));
  var hours = Math.floor((distance / (1000 * 60 * 60)) % 24);

  document.getElementById("countdown").innerHTML =
  "⏳ " + days + " Days " + hours + " Hours left";

  if (distance < 0) {
    clearInterval(x);
    document.getElementById("countdown").innerHTML = "🎉 It's Wedding Time!";
  }
}, 1000);
</script>

</body>
</html>
